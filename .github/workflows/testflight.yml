name: Deploy to TestFlight

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  APPLE_TEAM_ID: U4L88W98BS

jobs:
  build-and-upload:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_USER_POOL_ID: us-east-1_RhGVzVRp9
          VITE_COGNITO_CLIENT_ID: 52tpeumvp9sdjrm025n0aj36da
          VITE_COGNITO_DOMAIN: https://runcount-prod-107027.auth.us-east-1.amazoncognito.com
          VITE_COGNITO_REDIRECT_URI: https://runcount.rbios.net/auth/callback
          VITE_COGNITO_LOGOUT_URI: https://runcount.rbios.net/
          VITE_API_URL: https://4efpwsj952.execute-api.us-east-1.amazonaws.com
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: VITE_BASE=./ npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Resolve version metadata
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo v1.0.0)"
          fi
          VERSION="${VERSION#v}"
          # Strip prerelease suffix (e.g. 0.1.0-rc1 -> 0.1.0). Apple's
          # CFBundleShortVersionString must be 1-3 period-separated integers.
          VERSION="${VERSION%%-*}"
          echo "MARKETING_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath ios/App/SPM

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath ios/App/SPM \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ env.APPLE_TEAM_ID }} \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export and upload to App Store Connect
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ env.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
